<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🆘 Live SOS Tracker — BGI Pathfinder</title>

    <!-- Leaflet.js (Free, Open-Source Map Library) -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <!-- Supabase JS Client -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #0f0f1a;
            color: #e0e0ff;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ── Header Bar ── */
        .header {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid #2a2a4e;
            box-shadow: 0 2px 12px rgba(0,0,0,0.4);
            z-index: 1000;
        }
        .header .sos-badge {
            background: #ff0000;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 14px;
            animation: pulse 1.5s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(1.05); }
        }
        .header h1 { font-size: 18px; font-weight: 600; }
        .header .status {
            margin-left: auto;
            font-size: 13px;
            color: #78909c;
        }
        .header .status.connected { color: #4caf50; }

        /* ── Map Container ── */
        #map { flex: 1; width: 100%; }

        /* ── Info Panel ── */
        .info-panel {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 20px;
            border-top: 1px solid #2a2a4e;
            font-size: 13px;
            z-index: 1000;
        }
        .info-panel .coord {
            background: #2a2a3e;
            padding: 6px 14px;
            border-radius: 8px;
            font-family: 'Fira Code', monospace;
            font-size: 12px;
        }
        .info-panel .time { color: #78909c; margin-left: auto; }

        /* ── Error State ── */
        .error-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
            gap: 16px;
        }
        .error-screen .icon { font-size: 64px; }
        .error-screen h2 { font-size: 22px; color: #ef5350; }
        .error-screen p { color: #78909c; max-width: 400px; }
    </style>
</head>
<body>
    <!-- Header -->
    <div class="header">
        <span class="sos-badge">🆘 LIVE</span>
        <h1>SOS Tracker</h1>
        <span class="status" id="statusText">⏳ Connecting...</span>
    </div>

    <!-- Map -->
    <div id="map"></div>

    <!-- Info Panel -->
    <div class="info-panel">
        <span>📍</span>
        <span class="coord" id="coordText">Waiting for location...</span>
        <span class="time" id="timeText">--</span>
    </div>

    <script>
        // ══════════════════════════════════════════
        // ⚠️ CONFIGURATION — Replace with your Supabase credentials
        // ══════════════════════════════════════════
        const SUPABASE_URL = 'https://YOUR_PROJECT_ID.supabase.co';
        const SUPABASE_ANON_KEY = 'YOUR_ANON_KEY';

        // ══════════════════════════════════════════
        // Extract channel ID from URL: ?id=sos-abc12345
        // ══════════════════════════════════════════
        const params = new URLSearchParams(window.location.search);
        const channelId = params.get('id');

        if (!channelId) {
            document.body.innerHTML = `
                <div class="error-screen">
                    <span class="icon">❌</span>
                    <h2>Invalid Tracking Link</h2>
                    <p>No tracking session ID found in the URL.<br>
                    The link should look like: <code>?id=sos-abc12345</code></p>
                </div>`;
            throw new Error('No channel ID');
        }

        // ══════════════════════════════════════════
        // Initialize Leaflet Map
        // ══════════════════════════════════════════
        const map = L.map('map').setView([26.2183, 78.1828], 14); // Default: Gwalior

        // Dark-themed tile layer (CartoDB Dark Matter)
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '© OpenStreetMap © CartoDB',
            maxZoom: 19,
        }).addTo(map);

        // SOS Marker with pulsing red circle
        const sosIcon = L.divIcon({
            className: 'sos-marker',
            html: `
                <div style="
                    width: 20px; height: 20px;
                    background: #ff0000;
                    border: 3px solid white;
                    border-radius: 50%;
                    box-shadow: 0 0 0 0 rgba(255,0,0,0.7);
                    animation: markerPulse 1.5s infinite;
                "></div>
                <style>
                    @keyframes markerPulse {
                        0% { box-shadow: 0 0 0 0 rgba(255,0,0,0.7); }
                        70% { box-shadow: 0 0 0 20px rgba(255,0,0,0); }
                        100% { box-shadow: 0 0 0 0 rgba(255,0,0,0); }
                    }
                </style>`,
            iconSize: [20, 20],
            iconAnchor: [10, 10],
        });

        let marker = null;
        let pathLine = null;
        const pathCoords = [];
        let updateCount = 0;

        // ══════════════════════════════════════════
        // Initialize Supabase & Subscribe to Broadcast
        // ══════════════════════════════════════════
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const channel = supabase.channel(channelId, {
            config: {
                broadcast: { self: true },
            },
        });

        channel
            .on('broadcast', { event: 'location_update' }, (payload) => {
                const { lat, lng, timestamp } = payload.payload;
                updateCount++;

                console.log(`📡 Update #${updateCount}: ${lat}, ${lng}`);

                // Update or create marker
                if (!marker) {
                    marker = L.marker([lat, lng], { icon: sosIcon }).addTo(map);
                    marker.bindPopup('🆘 SOS Location').openPopup();
                    map.setView([lat, lng], 16);
                } else {
                    marker.setLatLng([lat, lng]);
                    map.panTo([lat, lng]);
                }

                // Draw trail path
                pathCoords.push([lat, lng]);
                if (pathLine) map.removeLayer(pathLine);
                pathLine = L.polyline(pathCoords, {
                    color: '#ff4444',
                    weight: 3,
                    opacity: 0.6,
                    dashArray: '8, 6',
                }).addTo(map);

                // Update info panel
                document.getElementById('coordText').textContent =
                    `${lat.toFixed(6)}, ${lng.toFixed(6)}`;

                const time = new Date(timestamp);
                document.getElementById('timeText').textContent =
                    `Last update: ${time.toLocaleTimeString()} (${updateCount} updates)`;
            })
            .subscribe((status) => {
                const statusEl = document.getElementById('statusText');
                if (status === 'SUBSCRIBED') {
                    statusEl.textContent = '🟢 Connected — Waiting for location...';
                    statusEl.className = 'status connected';
                } else if (status === 'CLOSED') {
                    statusEl.textContent = '🔴 Disconnected';
                    statusEl.className = 'status';
                } else {
                    statusEl.textContent = `⏳ ${status}...`;
                }
                console.log('Channel status:', status);
            });

        // Update page title
        document.title = `🆘 Tracking: ${channelId}`;
    </script>
</body>
</html>
